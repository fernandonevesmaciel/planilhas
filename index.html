<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Filtro Industrial - Seletor de Categoria</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #eef2f3; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 450px; }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        /* Estilização do Select */
        select, input[type="file"] { 
            margin-bottom: 20px; 
            width: 100%; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #ccc;
            font-size: 14px;
        }
        #tipoEquipamento{
            width: 470px;
        }
        
        button { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #219150; }
    </style>
</head>
<body>

<div class="card">
    <h2>Filtro de Eventos</h2>
    <p>Selecione o tipo de equipamento para o relatório:</p>
    
    <select id="tipoEquipamento">
        <option value="11">Porta de Emergência</option>
        <option value="10">Compressor </option>
    </select>

    <input type="file" id="excelFiles" accept=".xlsx, .xls" multiple>
    <button id="btn">Gerar PDF Formatado</button>
</div>

<script>
    // Função para converter número serial do Excel em Data e Hora formatada
    function formatarDataExcel(serial) {
        if (!serial || isNaN(serial)) return { data: serial, hora: serial };
        
        const data = new Date(Math.round((serial - 25569) * 86400 * 1000));
        
        const dia = String(data.getUTCDate()).padStart(2, '0');
        const mes = String(data.getUTCMonth() + 1).padStart(2, '0');
        const ano = data.getUTCFullYear();
        const hora = String(data.getUTCHours()).padStart(2, '0');
        const min = String(data.getUTCMinutes()).padStart(2, '0');
        const seg = String(data.getUTCSeconds()).padStart(2, '0');

        return {
            data: `${dia}/${mes}/${ano}`,
            hora: `${hora}:${min}:${seg}`
        };
    }

    document.getElementById('btn').addEventListener('click', async () => {
        const files = document.getElementById('excelFiles').files;
        const categoriaSelecionada = document.getElementById('tipoEquipamento').value;
        const nomeEquipamento = document.getElementById('tipoEquipamento').options[document.getElementById('tipoEquipamento').selectedIndex].text;

        if (files.length === 0) return alert("Selecione ao menos um arquivo!");

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        let todosDados = [];

        for (let file of files) {
            const dataBuffer = await file.arrayBuffer();
            const workbook = XLSX.read(dataBuffer, { cellDates: false });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet);

            rows.forEach(row => {
                const catNoArquivo = String(row.Category || "");
                
                // Compara a categoria do Excel com a selecionada no Select
                if (catNoArquivo === categoriaSelecionada) {
                    const dataFormatada = formatarDataExcel(row.Date);
                    const horaFormatada = formatarDataExcel(row.Time);

                    todosDados.push([
                        dataFormatada.data || row.Date, 
                        horaFormatada.hora || row.Time, 
                        row.Message || ""
                    ]);
                }
            });
        }

        if (todosDados.length > 0) {
            doc.setFontSize(16);
            doc.text(`Relatório: ${nomeEquipamento}`, 14, 15);
            
            doc.autoTable({
                head: [['Data', 'Hora', 'Mensagem']],
                body: todosDados,
                startY: 25,
                theme: 'grid',
                headStyles: { fillColor: [39, 174, 96] },
                styles: { fontSize: 9 }
            });

            doc.save(`Relatorio_${nomeEquipamento.replace(/\s+/g, '_')}.pdf`);
        } else {
            alert(`Nenhum dado encontrado para a categoria ${categoriaSelecionada}.`);
        }
    });
</script>

</body>
</html>
